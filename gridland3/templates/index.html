<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="description" content="Gridland Tactical Aegis — Real-time security reconnaissance dashboard">
    <title>GRIDLAND // TACTICAL AEGIS</title>

    <!-- Air-gapped assets — no CDNs -->
    <link rel="stylesheet" href="/static/pico.classless.min.css">
    <link rel="stylesheet" href="/static/aegis.css">
</head>
<body>
    <div class="aegis-grid">

        <!-- ═══ HEADER BAR ═══════════════════════════════════════ -->
        <div class="grid-header">
            <h1 class="aegis-title">
                GRIDLAND<span class="subtitle">TACTICAL AEGIS</span>
            </h1>

            <div id="status-badge"></div>

            <form class="scan-form"
                  hx-post="/api/scan"
                  hx-target="#scan-live-area"
                  hx-swap="innerHTML"
                  hx-indicator="#scan-spinner"
                  hx-disabled-elt="find button">

                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                <input type="text"
                       name="target"
                       id="target-input"
                       placeholder="192.168.1.0/24"
                       required
                       autocomplete="off"
                       spellcheck="false">

                <select name="scan_mode" id="scan-mode">
                    <option value="discover">PASSIVE</option>
                    <option value="aggressive">AGGRESSIVE</option>
                </select>

                <button type="submit" id="scan-btn">▶ SCAN</button>

                <span id="scan-spinner" class="htmx-indicator badge badge-running" style="display:none;">…</span>
            </form>
        </div>

        <!-- ═══ TARGETS PANEL ════════════════════════════════════ -->
        <div class="grid-targets">
            <p class="panel-title">DISCOVERED TARGETS</p>
            <div id="targets-content">
                <p class="text-muted font-data" style="font-size:0.75rem;">Enter a target and press SCAN to begin.</p>
            </div>
        </div>

        <!-- ═══ INTEL PANEL ══════════════════════════════════════ -->
        <div class="grid-intel">
            <p class="panel-title">INTELLIGENCE FEED</p>
            <div id="intel-content">
                <p class="text-muted font-data" style="font-size:0.75rem;">No intel collected.</p>
            </div>
        </div>

        <!-- ═══ LOG FEED ═════════════════════════════════════════ -->
        <div class="grid-logs">
            <div class="log-header">
                <p class="log-header-title">LIVE SCAN LOG</p>
            </div>
            <div id="log-feed"></div>
        </div>

    </div>

    <!--
        SSE-connected area: The /api/scan POST returns an HTML fragment
        containing the hx-ext="sse" container. When HTMX swaps it in,
        the SSE connection is established and begins pushing into
        #targets-panel, #intel-panel, #log-feed, and #status-badge.

        We use a hidden div as the swap target; the SSE within it
        targets the visible grid panels via their IDs.
    -->
    <div id="scan-live-area" style="display:none;"></div>

    <!-- Air-gapped scripts -->
    <script src="/static/htmx.min.js"></script>

    <script>
        (function() {
            'use strict';

            const logFeed = document.getElementById('log-feed');
            const targetsContent = document.getElementById('targets-content');
            const intelContent = document.getElementById('intel-content');
            const statusBadge = document.getElementById('status-badge');
            const scanBtn = document.getElementById('scan-btn');
            const MAX_LOG_LINES = 50;

            let currentEventSource = null;

            // ── MutationObserver: 50-line FIFO log enforcer ──────
            const observer = new MutationObserver(() => {
                while (logFeed.children.length > MAX_LOG_LINES) {
                    logFeed.removeChild(logFeed.firstElementChild);
                }
                const logsContainer = logFeed.closest('.grid-logs');
                if (logsContainer) {
                    logsContainer.scrollTop = logsContainer.scrollHeight;
                }
            });
            observer.observe(logFeed, { childList: true });

            // ── CSRF Injection on all HTMX requests ──────────────
            document.body.addEventListener('htmx:configRequest', (e) => {
                const csrfMeta = document.querySelector('meta[name="csrf-token"]');
                if (csrfMeta) {
                    e.detail.headers['X-CSRFToken'] = csrfMeta.getAttribute('content');
                }
            });

            // ── After HTMX form POST succeeds, parse job_id and
            //    open a native EventSource for SSE streaming ──────
            document.body.addEventListener('htmx:afterRequest', (e) => {
                if (e.detail.pathInfo && e.detail.pathInfo.requestPath === '/api/scan' && e.detail.successful) {
                    // Extract job info from the HTML response
                    const scanArea = document.getElementById('scan-live-area');
                    const sseRoot = scanArea.querySelector('#sse-root');

                    if (sseRoot) {
                        const sseUrl = sseRoot.getAttribute('sse-connect');
                        if (sseUrl) {
                            connectSSE(sseUrl);
                        }
                    }

                    // Update status badge from the returned fragment
                    const badge = scanArea.querySelector('.badge');
                    if (badge) {
                        statusBadge.innerHTML = badge.outerHTML;
                    }

                    // Disable scan button while live
                    scanBtn.disabled = true;
                    scanBtn.textContent = '● LIVE';
                }
            });

            function connectSSE(url) {
                // Close existing connection if any
                if (currentEventSource) {
                    currentEventSource.close();
                }

                currentEventSource = new EventSource(url);

                currentEventSource.addEventListener('targets', (e) => {
                    targetsContent.innerHTML = e.data;
                });

                currentEventSource.addEventListener('intel', (e) => {
                    intelContent.innerHTML = e.data;
                });

                currentEventSource.addEventListener('logs', (e) => {
                    // Create a temp container to parse the HTML fragment
                    const tmp = document.createElement('div');
                    tmp.innerHTML = e.data;
                    while (tmp.firstChild) {
                        logFeed.appendChild(tmp.firstChild);
                    }
                });

                currentEventSource.addEventListener('status', (e) => {
                    statusBadge.innerHTML = e.data;

                    // If terminal state, clean up
                    if (e.data.includes('badge-done') || e.data.includes('badge-failed')) {
                        currentEventSource.close();
                        currentEventSource = null;
                        scanBtn.disabled = false;
                        scanBtn.textContent = '▶ SCAN';
                    }
                });

                currentEventSource.onerror = () => {
                    // SSE closed by server (normal on completion) or error
                    if (currentEventSource) {
                        currentEventSource.close();
                        currentEventSource = null;
                    }
                    scanBtn.disabled = false;
                    scanBtn.textContent = '▶ SCAN';
                };
            }
        })();
    </script>
</body>
</html>
